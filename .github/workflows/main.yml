name: Android Dual Runner Stable

on:
workflow_dispatch:
schedule:
- cron: "0 */6 * * *"

jobs:
run:
runs-on: ubuntu-latest
timeout-minutes: 360

```
strategy:
  fail-fast: false
  matrix:
    instance: [1, 2]

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Run Emulator & App
    uses: reactivecircus/android-emulator-runner@v2
    with:
      api-level: 30
      target: default
      arch: x86_64
      profile: Nexus 6
      disable-animations: true
      emulator-options: "-no-window -no-audio -gpu swiftshader_indirect"
      script: |
        adb wait-for-device
        sleep 10

        adb shell settings put global window_animation_scale 0
        adb shell settings put global transition_animation_scale 0
        adb shell settings put global animator_duration_scale 0

        for i in 1 2 3; do
          adb install -r app.apk && break
          sleep 5
        done

        sleep 5

        adb shell monkey -p com.adsviewer.app -c android.intent.category.LAUNCHER 1

        sleep 20

        for i in $(seq 1 20); do
          adb shell input tap 820 1600 || true
          adb shell input tap 880 1650 || true
          adb shell input tap 930 1700 || true
          adb shell input tap 980 1750 || true
          adb shell input keyevent 66 || true
          sleep 2
        done

        sleep 21000
```
