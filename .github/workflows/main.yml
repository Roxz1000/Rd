name: Android Dual Runner Stable

on:
workflow_dispatch:
schedule:
- cron: "0 */6 * * *"

jobs:
run:
runs-on: ubuntu-latest
timeout-minutes: 360

```
strategy:
  fail-fast: false
  matrix:
    instance: [1, 2]

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Run Emulator & App
    uses: reactivecircus/android-emulator-runner@v2
    with:
      api-level: 30
      target: default
      arch: x86_64
      profile: Nexus 6
      disable-animations: true
      emulator-options: -no-window -no-audio -gpu swiftshader_indirect
      script: |
        echo "Starting instance ${{ matrix.instance }}"

        adb wait-for-device
        sleep 10

        # Speed optimizations
        adb shell settings put global window_animation_scale 0
        adb shell settings put global transition_animation_scale 0
        adb shell settings put global animator_duration_scale 0

        # Install APK (retry)
        for i in $(seq 1 3); do
          adb install -r app.apk && break
          echo "Install failed, retrying..."
          sleep 5
        done

        sleep 5

        # Launch app
        adb shell monkey -p com.adsviewer.app -c android.intent.category.LAUNCHER 1

        # Wait for VPN popup
        sleep 20

        # VPN auto click (bottom-right spam)
        for i in $(seq 1 20); do
          adb shell input tap 820 1600 || true
          adb shell input tap 880 1650 || true
          adb shell input tap 930 1700 || true
          adb shell input tap 980 1750 || true
          adb shell input keyevent 66 || true
          sleep 2
        done

        echo "App running..."

        # Keep alive (~6 hours)
        sleep 21000
