name: Android Single Runner

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - uses: actions/checkout@v4

      - name: Run Emulator & App
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-options: "-no-window -no-audio -gpu swiftshader_indirect -verbose"
          script: |
            echo "Waiting for device..."
            adb wait-for-device
            
            # Kill server and restart if device offline
            for i in $(seq 1 10); do
              DEVICE_STATUS=$(adb devices | grep emulator | awk '{print $2}')
              if [ "$DEVICE_STATUS" = "device" ]; then
                echo "Device is online!"
                break
              else
                echo "Device status: $DEVICE_STATUS, retrying... ($i/10)"
                adb kill-server
                adb start-server
                sleep 5
              fi
            done
            
            # Wait for full boot
            echo "Waiting for boot completion..."
            for i in $(seq 1 30); do
              BOOT_STATUS=$(adb shell getprop sys.boot_completed 2>/dev/null || echo "0")
              if [ "$BOOT_STATUS" = "1" ]; then
                echo "Boot completed!"
                break
              else
                echo "Waiting for boot... ($i/30)"
                sleep 5
              fi
            done
            
            sleep 10

            echo "Disabling animations..."
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            echo "Installing app..."
            adb install -r app.apk
            sleep 5

            echo "Launching app..."
            adb shell monkey -p com.adsviewer.app -c android.intent.category.LAUNCHER 1
            sleep 5

            echo "Accepting VPN permission..."
            for i in 1 2 3 4 5; do
              adb shell input keyevent 23 2>/dev/null
              sleep 1
              adb shell input keyevent 66 2>/dev/null
              sleep 1
              adb shell input tap 540 1200 2>/dev/null
              sleep 1
              adb shell input tap 900 1700 2>/dev/null
              sleep 1
              adb shell input tap 720 1500 2>/dev/null
              sleep 1
            done

            adb shell monkey -p com.adsviewer.app -c android.intent.category.LAUNCHER 1
            sleep 3

            echo "Running app for 6 hours..."
            for i in $(seq 1 2160); do
              if [ $((i % 100)) -eq 0 ]; then
                echo "Progress: $((i * 100 / 2160))% - Cycle: $i/2160"
              fi
              
              # Check device status and reconnect if needed
              DEVICE_STATUS=$(adb devices | grep emulator | awk '{print $2}')
              if [ "$DEVICE_STATUS" != "device" ]; then
                echo "Reconnecting device..."
                adb kill-server
                adb start-server
                adb wait-for-device
                sleep 5
              fi
              
              adb shell input tap 540 1000 2>/dev/null
              sleep 2
              adb shell input swipe 500 800 500 700 50 2>/dev/null
              sleep 2
              adb shell input keyevent 82 2>/dev/null
              sleep 6
            done

            echo "6 hours completed successfully!"
