name: Ultimate Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
    
    - name: Extract & Setup Fresh
      run: |
        unzip -o Ads-maker.zip -d src
        mkdir -p project
        cp -r src/Ads-maker/Ads-maker/* project/ 2>/dev/null || cp -r src/Ads-maker/* project/ 2>/dev/null || cp -r src/* project/

    - name: Create Fresh Gradle Wrapper
      run: |
        cd project
        # Delete purani gradlew
        rm -f gradlew gradlew.bat
        rm -rf gradle/wrapper/*.jar
        
        # Install gradle
        sudo apt-get update -qq && sudo apt-get install -y -qq gradle
        
        # Generate nayi gradlew
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew
        ls -la gradlew gradle/wrapper/

    - name: Setup local.properties
      run: |
        cd project
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties

    - name: Build APK
      run: |
        cd project
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: "**/app/build/outputs/apk/debug/*.apk"
