name: Run Telegram Bot 24/7

on:
  schedule:
    - cron: '0 */6 * * *'  # Har 6 ghante auto restart
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Bot
      run: |
        unzip -o *.zip -d ./extracted
        WEBAPP=$(find ./extracted -type d -name "webapp" | head -1)
        mkdir -p ./webapp
        cp -r $WEBAPP/* ./webapp/
        cd webapp && npm install --production
    
    - name: Run Bot 6 Hours
      working-directory: ./webapp
      run: node bot.js
