name: Android Single Runner

on:
workflow_dispatch:

jobs:
run:
runs-on: ubuntu-latest
timeout-minutes: 360

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Run Emulator & App
    uses: reactivecircus/android-emulator-runner@v2
    with:
      api-level: 30
      target: default
      arch: x86_64
      profile: Nexus 6
      disable-animations: true
      emulator-options: "-no-window -no-audio -gpu swiftshader_indirect"
      script: |
        adb wait-for-device
        sleep 10

        adb shell settings put global window_animation_scale 0
        adb shell settings put global transition_animation_scale 0
        adb shell settings put global animator_duration_scale 0

        adb install -r app.apk

        sleep 5

        adb shell monkey -p com.adsviewer.app -c android.intent.category.LAUNCHER 1

        sleep 20

        for i in $(seq 1 20); do
          adb shell input tap 900 1700 || true
          adb shell input keyevent 66 || true
          sleep 2
        done

        sleep 21000
```
