name: Build from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
    
    - name: Extract ZIP
      run: |
        unzip -o Ads-maker.zip -d extracted
        # Find actual project folder
        PROJECT_DIR=$(find extracted -name "gradlew" -type f | head -1 | xargs dirname)
        echo "Project found at: $PROJECT_DIR"
        mv "$PROJECT_DIR" project
        cd project
        chmod +x gradlew
        ls -la
    
    - name: Setup local.properties
      run: |
        cd project
        echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Build Debug APK
      run: |
        cd project
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: project/app/build/outputs/apk/debug/*.apk
